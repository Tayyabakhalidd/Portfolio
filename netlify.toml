[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect everything to index.html except real files and functions
# (single-page app style — not strictly required here, but harmless)
[[redirects]]
  from = "/admin-dashboard"
  to = "/index.html#admin-access"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
